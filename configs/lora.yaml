# configs/lora.yaml
model:
  pretrained_model_name_or_path: "/data/clx/control-lora-v2-master/ckpt/FLUX.2-klein-base-9B"
  revision: null
  bnb_quantization_config_path: null
  do_fp8_training: false
  variant: null

dataset:
  name: null
  config_name: null
  instance_data_dir: "/data/clx/data/wenli_data/tile_flux2_klein/resolution512"
  class_data_dir: null
  image_column: "image"
  cond_image_column: "target"
  caption_column: "promet"
  repeats: 1
  resolution: 768
  aspect_ratio_buckets: "1024,1024;768,1360;1360,768;880,1168;1168,880;1248,832;832,1248"
  center_crop: false
  random_flip: true

training:
  train_batch_size: 2
  sample_batch_size: 4
  num_train_epochs: 200
  max_train_steps: null
  checkpointing_steps: 500
  checkpoints_total_limit: 20
  resume_from_checkpoint: null
  gradient_accumulation_steps: 2
  gradient_checkpointing: false
  learning_rate: 5e-5
  lr_scheduler: "cosine"
  lr_warmup_steps: 1000
  lr_num_cycles: 1
  lr_power: 1.0
  scale_lr: false
  mixed_precision: "bf16"
  allow_tf32: false
  offload: false
  cache_latents: false
  max_grad_norm: 1.0
  dataloader_num_workers: 0

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  layers: null
  lora_layers: null
  upcast_before_saving: false

optimizer:
  type: "AdamW"
  use_8bit_adam: false
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  adam_weight_decay: 1e-4
  adam_weight_decay_text_encoder: 1e-3
  prodigy_beta3: null
  prodigy_decouple: true
  prodigy_use_bias_correction: true
  prodigy_safeguard_warmup: true

validation:
  validation_prompt: "修复扭曲的建筑立面纹理，使纹理自然、清晰、结构不变"
  validation_image: "test/Image1.png"
  num_validation_images: 4
  validation_epochs: 1
  skip_final_inference: false
  final_validation_prompt: null

logging:
  output_dir: "/data/clx/tmp/flux-dreambooth-lora"
  logging_dir: "logs"
  report_to: "tensorboard"
  push_to_hub: false
  hub_token: null
  hub_model_id: null
  guidance_scale: 1.5
  weighting_scheme: "none"
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29

distributed:
  local_rank: -1
  enable_npu_flash_attention: false
  fsdp_text_encoder: false