model:
  model_name: "flux2_klein"
  trainer_name: "flux2kelinimage2image_lora"
  pipeline_name: "flux2kleinpipeline"
  pretrained_model_name_or_path: "ckpt/FLUX.2-klein-base-4B"
  revision: null
  variant: null
  mixed_precision: "bf16"
  max_sequence_length: 512

data:
  data_json: "./train.jsonl"
  resolution: 768
  dataloader_num_workers: 0
  aspect_ratio_buckets: "768,768"

training:
  output_dir: "./flux-dreambooth-lora2"
  max_train_steps: 5000
  checkpointing_steps: 200
  train_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-5
  lr_scheduler: "cosine"
  lr_warmup_rate: 0.02
  optimizer: "AdamW"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-04
  max_grad_norm: 1.0
  weighting_scheme: null
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29

validation:
  validation_prompt: " "
  validation_image: "image/Image.png"
  validation_steps: 200
  seed: 5534331

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"
