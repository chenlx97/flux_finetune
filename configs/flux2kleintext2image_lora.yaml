model:
  model_name: "flux2_klein"
  trainer_name: "flux2kelintext2image_lora"
  pipeline_name: "flux2kleinpipeline"
  pretrained_model_name_or_path: "/data/clx/control-lora-v2-master/ckpt/FLUX.2-klein-base-4B"
  revision: null
  variant: null
  mixed_precision: "bf16"
  enable_npu_flash_attention: false
  max_sequence_length: 512

data:
  data_json: "/data/clx/tmp/dog/train.jsonl"
  resolution: 768
  center_crop: false
  random_flip: false
  dataloader_num_workers: 0
  aspect_ratio_buckets: "768,768"

training:
  output_dir: "/data/clx/tmp/flux-dreambooth-lora2-dog"
  off_load: True
  num_train_epochs: 500
  max_train_steps: 1000
  checkpointing_steps: 50
  checkpoints_total_limit: 20
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  optimizer: "AdamW"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-04
  max_grad_norm: 1.0
  seed: null
  lr_num_cycles: 1
  lr_power: 1.0
  weighting_scheme: null
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29
  train_batch_size: 1

validation:

  validation_prompt: "A photo of sks dog in a bucket"
  validation_image: null
  validation_steps: 50
  skip_final_inference: false
  seed: 5534331

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"
